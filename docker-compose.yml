version: '3.8'
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: hospital_db
      MYSQL_ROOT_PASSWORD: Challa@1206
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  backend:
    build: ./careflow-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hospital_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Challa@1206
      WEBSOCKET_BROKER_TYPE: simple
      WEBSOCKET_BROKER_HOST: redis
      ENCRYPTION_SECRET_KEY: "NgYb7sE15YnJldHki+8UDlSFMn4WSJLwVHJ/r4jnL90="
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      ai-engine:
        condition: service_healthy
  frontend:
    build: ./hospital-frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
  ai-engine:
    build: ./careflow-ai-engine
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      qdrant:
        condition: service_healthy
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
volumes:
  mysql_data:
  qdrant_data:
