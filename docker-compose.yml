version: '3.8' 
 services: 
   mysql: 
     image: mysql:8.0 
     environment: 
       MYSQL_DATABASE: hospital_db 
       MYSQL_ROOT_PASSWORD: Challa@1206 
     ports: 
       - "3306:3306" 
     volumes: 
       - mysql_data:/var/lib/mysql 
 
   redis: 
     image: redis:7-alpine 
     ports: 
       - "6379:6379" 
 
   backend: 
     build: ./careflow-backend 
     ports: 
       - "8080:8080" 
     environment: 
       SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hospital_db 
       SPRING_DATASOURCE_USERNAME: root 
       SPRING_DATASOURCE_PASSWORD: Challa@1206 
       WEBSOCKET_BROKER_TYPE: redis 
       WEBSOCKET_BROKER_HOST: redis 
       ENCRYPTION_SECRET_KEY: ${ENCRYPTION_SECRET_KEY} 
     depends_on: 
       - mysql 
       - redis 
 
   frontend: 
     build: ./hospital-frontend 
     ports: 
       - "4200:80" 
     depends_on: 
       - backend 
 
 volumes: 
   mysql_data: 
