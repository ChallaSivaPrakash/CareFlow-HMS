<button class="chat-toggle-btn shadow-lg" (click)="toggleChat()" *ngIf="!isOpen">
  <i class="bi bi-chat-dots-fill"></i>
</button>

<div class="chat-window shadow-lg rounded-4 overflow-hidden animate-fade-in" *ngIf="isOpen">
  <div class="chat-header bg-primary text-white p-3 d-flex justify-content-between align-items-center">
    <span class="fw-bold"><i class="bi bi-hospital me-2"></i>Staff Intercom</span>
    <button class="btn-close btn-close-white" (click)="toggleChat()"></button>
  </div>

  <div class="chat-messages p-3 bg-light">
    <div *ngIf="messages.length === 0" class="text-center text-muted small mt-4">
      No messages yet. Start the conversation!
    </div>
    
    <div *ngFor="let msg of messages" class="mb-3" [ngClass]="{'text-end': msg.sender === currentUser}">
      <span class="small fw-bold text-muted d-block mb-1" *ngIf="msg.sender !== currentUser">{{ msg.sender }}</span>
      <div class="d-inline-block p-2 px-3 rounded-3" 
           [ngClass]="msg.sender === currentUser ? 'bg-primary text-white rounded-bottom-0' : 'bg-white border rounded-top-0'">
        {{ msg.content }}
      </div>
    </div>
  </div>

  <div class="chat-input p-2 bg-white border-top">
    <form (ngSubmit)="sendMessage()" class="input-group">
      <input type="text" class="form-control border-0 bg-light rounded-pill px-3" 
             placeholder="Type a message..." [(ngModel)]="newMessage" name="msg" autocomplete="off">
      <button type="submit" class="btn btn-primary rounded-circle ms-2" [disabled]="!newMessage.trim()">
        <i class="bi bi-send-fill"></i>
      </button>
    </form>
  </div>
</div>
