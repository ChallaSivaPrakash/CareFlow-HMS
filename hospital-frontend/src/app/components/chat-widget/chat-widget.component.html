<!-- Floating Action Button -->
<button 
  class="fixed bottom-6 right-6 z-[100] w-14 h-14 bg-blue-600 text-white shadow-lg hover:bg-blue-700 hover:shadow-xl transition-all duration-200 rounded-full flex items-center justify-center"
  (click)="toggleChat()"
>
  <i class="bi bi-chat-dots-fill text-xl" *ngIf="!isOpen"></i>
  <i class="bi bi-x-lg text-xl" *ngIf="isOpen"></i>
</button>

<!-- Chat Window -->
<div 
  class="fixed bottom-24 right-6 z-[99] w-[360px] h-[480px]" 
  *ngIf="isOpen"
>
  <div class="h-full flex flex-col bg-white border border-slate-200 rounded-2xl shadow-2xl overflow-hidden">
    <!-- Header -->
    <div class="px-5 py-4 border-b border-slate-200 bg-white">
      <h3 class="text-sm font-semibold text-slate-900 flex items-center gap-2">
        <i class="bi bi-headset text-blue-600"></i>
        CareFlow Virtual Receptionist
      </h3>
      <p class="text-xs text-slate-500 mt-0.5 flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 rounded-full bg-green-500 inline-block"></span>
        Online
      </p>
    </div>

    <!-- Messages -->
    <div 
      id="chat-messages" 
      class="flex-grow p-4 overflow-y-auto bg-slate-50"
    >
      <div *ngFor="let msg of messages" class="clear-both">
        <div 
          class="rounded-2xl px-4 py-2.5 mb-3 max-w-[85%] text-sm leading-relaxed"
          [ngClass]="{
            'bg-blue-600 text-white float-right': msg.sender === 'user',
            'bg-white border border-slate-200 text-slate-700 float-left': msg.sender === 'bot'
          }"
        >
          {{ msg.text }}
        </div>
      </div>

      <!-- Loading Indicator -->
      <div class="clear-both float-left mb-3" *ngIf="isLoading">
        <div class="bg-white border border-slate-200 rounded-2xl px-4 py-3">
          <div class="flex gap-1 items-center">
            <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0ms;"></div>
            <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 150ms;"></div>
            <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 300ms;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="p-3 border-t border-slate-200 bg-white">
      <div class="flex gap-2">
        <input 
          type="text" 
          [(ngModel)]="currentMessage"
          (keyup.enter)="sendMessage()"
          class="flex-grow bg-slate-50 border border-slate-200 rounded-full px-4 py-2 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-500 transition-colors"
          placeholder="Type your message..."
        >
        <button 
          class="w-10 h-10 flex-shrink-0 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-200 disabled:cursor-not-allowed text-white rounded-full flex items-center justify-center transition-colors"
          (click)="sendMessage()"
          [disabled]="isLoading || !currentMessage.trim()"
        >
          <i class="bi bi-send-fill text-sm"></i>
        </button>
      </div>
    </div>
  </div>
</div>
