<div class="forgot-password-container">
  <div class="card shadow-lg p-4">
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill text-primary display-4"></i>
      <h2 class="mt-2">Forgot Password</h2>
      <p class="text-muted">Recover your CareFlow account</p>
    </div>

    <!-- Step 1: Email Input -->
    <div *ngIf="step === 1">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" [(ngModel)]="email" placeholder="Enter your registered email">
        </div>
      </div>
      <button class="btn btn-primary w-100 py-2" [disabled]="isLoading || !email" (click)="sendOTP()">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        Send Reset OTP
      </button>
    </div>

    <!-- Step 2: OTP Verification -->
    <div *ngIf="step === 2">
      <div class="mb-3">
        <label class="form-label">Enter 6-Digit OTP</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-key"></i></span>
          <input type="text" class="form-control text-center ls-lg" [(ngModel)]="otp" maxlength="6" placeholder="000000">
        </div>
        <div class="form-text">We've sent a code to {{ email }}</div>
      </div>
      <button class="btn btn-primary w-100 py-2" [disabled]="isLoading || otp.length !== 6" (click)="verifyOTP()">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        Verify OTP
      </button>
      <button class="btn btn-link w-100 mt-2 text-decoration-none" (click)="step = 1">Back to Email</button>
    </div>

    <!-- Step 3: New Password -->
    <div *ngIf="step === 3">
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" class="form-control" [(ngModel)]="newPassword" placeholder="Minimum 6 characters">
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" [(ngModel)]="confirmPassword" placeholder="Repeat new password">
      </div>
      <button class="btn btn-success w-100 py-2" [disabled]="isLoading || !newPassword || newPassword !== confirmPassword" (click)="resetPassword()">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        Set New Password
      </button>
    </div>

    <div *ngIf="message" class="alert mt-4" [ngClass]="isError ? 'alert-danger' : 'alert-success'">
      {{ message }}
    </div>

    <div class="text-center mt-4">
      <a routerLink="/login" class="text-decoration-none">
        <i class="bi bi-arrow-left me-1"></i> Back to Login
      </a>
    </div>
  </div>
</div>
