<div *ngIf="isRedAlertActive" class="emergency-banner">
  <div class="banner-content">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    {{ alertMessage }}
  </div>
</div>

<router-outlet></router-outlet>

<div class="fab-container" *ngIf="authService.getToken()">
  <!-- Global Emergency Toggle Button -->
  <button class="btn btn-danger rounded-circle shadow-lg p-3" 
          (click)="toggleEmergency()" 
          [class.active]="isEmergencyActive"
          title="Trigger Trauma Alert">
    <span style="font-size: 1.5rem;">🚨</span>
  </button>

  <!-- Global Chat Component -->
  <app-chat></app-chat>
</div>
